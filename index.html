<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet" />
    <title>workMitra - Micro-Gigs, Assignments & Academic Projects Platform</title>

    <!-- Primary Meta Tags -->
    <meta name="title" content="workMitra - Micro-Gigs, Assignments & Academic Projects Platform" />
    <meta name="description" content="Connect students with companies and faculty members. Get certified micro-gigs, academic course projects, and real-time collaborative workspace tools with verified achievements." />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://myworkmitra.in/" />
    <meta property="og:title" content="workMitra - Micro-Gigs, Assignments & Academic Projects Platform" />
    <meta property="og:description" content="Connect students with companies and faculty members. Get certified micro-gigs, academic course projects, and real-time collaborative workspace tools with verified achievements." />
    <meta property="og:image" content="https://myworkmitra.in/logo-preview.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://myworkmitra.in/" />
    <meta property="twitter:title" content="workMitra - Micro-Gigs, Assignments & Academic Projects Platform" />
    <meta property="twitter:description" content="Connect students with companies and faculty members. Get certified micro-gigs, academic course projects, and real-time collaborative workspace tools with verified achievements." />
    <meta property="twitter:image" content="https://myworkmitra.in/logo-preview.png" />
    <style>
      body {
        background-color: #fdfbf7;
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background-color: #0f172a;
        }
      }
      .initial-loader {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100vw;
        font-family: 'Inter', sans-serif;
        color: #1e1b4b;
        flex-direction: column;
        gap: 16px;
      }
      @media (prefers-color-scheme: dark) {
        .initial-loader {
          color: #f8fafc;
        }
      }
      .spinner {
        width: 48px;
        height: 48px;
        border: 4px solid rgba(245, 158, 11, 0.2);
        border-top-color: #f59e0b;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-loader">
        <div class="spinner"></div>
        <div style="font-weight: 700; letter-spacing: 2px; font-size: 14px;">LOADING PLATFORM...</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js")
            .then(reg => console.log("Service Worker registered successfully!"))
            .catch(err => console.error("Service Worker registration failed:", err));
        });
      }
    </script>
  </body>
</html>
