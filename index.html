<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <title>workMitra</title>
    <style>
      body {
        background: linear-gradient(135deg, #fce4d6 0%, #fbcfe8 15%, #fef3c7 30%, #fce7f3 45%, #e9d5ff 60%, #fed7aa 75%, #fbcfe8 90%, #fce4d6 100%);
        background-size: 400% 400%;
        animation: meshGradientAnimation 15s ease infinite;
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 15%, #312e81 30%, #4c1d95 45%, #581c87 60%, #4c1d95 75%, #312e81 90%, #0f172a 100%);
          background-size: 400% 400%;
        }
      }
      @keyframes meshGradientAnimation {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      .initial-loader {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100vw;
        font-family: 'Inter', sans-serif;
        color: #8b5cf6;
        flex-direction: column;
        gap: 16px;
      }
      .spinner {
        width: 48px;
        height: 48px;
        border: 4px solid rgba(139, 92, 246, 0.2);
        border-top-color: #8b5cf6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-loader">
        <div class="spinner"></div>
        <div style="font-weight: 700; letter-spacing: 2px; font-size: 14px;">LOADING PLATFORM...</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js")
            .then(reg => console.log("Service Worker registered successfully!"))
            .catch(err => console.error("Service Worker registration failed:", err));
        });
      }
    </script>
  </body>
</html>
